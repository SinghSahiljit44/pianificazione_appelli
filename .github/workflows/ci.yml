name: CI

on:
  push:
    branches:
      - main
      - backend-ristruttura
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest

    # Postgres needed by the api-e2e target (the API connects at runtime).
    # Values mirror the defaults in libs/database/src/lib/database.module.ts.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: PWS
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_USERNAME: postgres
      PG_PASSWORD: PWS
      PG_DATABASE: app

    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Cache node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      # Playwright browsers for the e2e target (chromium, firefox, webkit)
      - run: npx playwright install --with-deps

      - run: npx nx format:check --base="remotes/origin/main"
      - run: npx nx run-many -t lint test build typecheck e2e
